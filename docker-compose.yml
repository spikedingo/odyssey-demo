services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: odyssey
      POSTGRES_USER: odyssey
      POSTGRES_PASSWORD: odyssey
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U odyssey']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
